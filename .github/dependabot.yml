version: 2
updates:
  # Maintain dependencies for npm in the root directory (e.g. Playwright)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"

  # Maintain dependencies for the client
  - package-ecosystem: "npm"
    directory: "/client"
    schedule:
      interval: "weekly"

  # Maintain dependencies for the server
  - package-ecosystem: "npm"
    directory: "/server"
    schedule:
      interval: "weekly"

  # Maintain dependencies for GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
